services:
  ingress:
    image: nginx:1.27-alpine
    container_name: fausse_cafe_ingress
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./ingress/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - fausse_cafe_net

  frontend:
    build:
      context: ./frontend
    container_name: fausse_cafe_frontend
    environment:
      - VITE_API_BASE_URL=/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5173"
    networks:
      - fausse_cafe_net

  backend:
    build:
      context: ./backend
    container_name: fausse_cafe_backend
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://cafe_user:cafe_password@db:5432/cafe_fausse
      - CORS_ORIGINS=http://fausse-cafe.com,http://localhost
      # Exposes the /api/customers and /api/reservations list endpoints, which
      # return customer PII. Enabled here for local demos only; leave it unset
      # (off) in any deployed environment.
      - ENABLE_DEMO_ENDPOINTS=true
      # Testing only: lower the table count so slots/days fill fast (1 booking
      # fills a slot, 6 fill a day). Remove or set to 30 for the real demo.
      # - TABLE_COUNT=1
      # Reservation confirmation emails are captured by the local Mailpit
      # service (below) and viewable at http://localhost:8025 — nothing leaves
      # your machine. SMTP_USE_TLS=false because Mailpit speaks plaintext SMTP.
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_USE_TLS=false
      - MAIL_FROM=reservations@fausse-cafe.com
    depends_on:
      - db
      - mailpit
    volumes:
      - ./backend:/app
    expose:
      - "5000"
    networks:
      - fausse_cafe_net

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: fausse_cafe_mailpit
    ports:
      - "8025:8025"   # web inbox — open http://localhost:8025 to read emails
    expose:
      - "1025"        # SMTP, reachable as mailpit:1025 on the internal network
    networks:
      - fausse_cafe_net

  db:
    image: postgres:16-alpine
    container_name: fausse_cafe_db
    environment:
      - POSTGRES_DB=cafe_fausse
      - POSTGRES_USER=cafe_user
      - POSTGRES_PASSWORD=cafe_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    networks:
      - fausse_cafe_net

networks:
  fausse_cafe_net:

volumes:
  postgres_data:
  frontend_node_modules:
